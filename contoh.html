<!doctype html>
<html lang="en">
  <head>
    <title>Bootstrap 4 Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <style>
      .open-sans-tentang {
        font-family: "Open Sans", sans-serif;
        font-optical-sizing: auto;
        font-weight: 300;
        font-size: xx-large;
        font-style: normal;
        font-variation-settings: "wdth" 100;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row text-left">
        <div class="col-10">
          <h2>Gregorius Cahya Khrisna Setiaputra <small>5026241122</small></h2>
        </div>
        <div class="col-2">
          <h4>Modal</h4>
        </div>
      </div>
      <div class="row">
        <div class="col-3">
          <p>Periksa riwayat pembayaran:</p>
        </div>
        <div class="col-9">
          <!--tombol modal-->
          <button
            type="button"
            class="btn btn-secondary"
            data-toggle="modal"
            data-target="#modalku"
          >
            Periksa
          </button>
        </div>
      </div>



      <!--modalnya-->
      <div class="modal" id="modalku">
        <div class="modal-dialog">
          <div class="modal-content">
            <!--modal header-->
            <div class="modal-header">
              <h4 class="modal-title">Riwayat Pembayaran</h4>
            </div>

            <!--modal body-->
            <div class="modal-body">
              <p>Berikut adalah 3 riwayat pembayaran terakhir Anda:</p>
              <ul>
                <li><p>Januari: Rp 150.000 (Lunas)</p></li>
                <li><p>Februari: Rp 150.000 (Lunas)</p></li>
                <li><p>Maret: Rp 150.000 (Lunas)</p></li>
              </ul>
            </div>

            <!-- Modal footer -->
            <div class="modal-footer">
              <button type="button" class="btn btn-success" data-dismiss="modal">
                Konfirmasi
              </button>
            </div>


          </div>
        </div>
      </div>

      
    </div>
  </body>
</html>
